<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Blog Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Edit Blog Post</h1>
        <!-- Sendet eine POST-Anfrage an exakt dieselbe Update-Route mit der ID -->
        <form action="{{ url_for('update', post_id=post.id) }}" method="POST">
            <label for="author">Author:</label>
            <input type="text" id="author" name="author" value="{{ post.author }}" required>

            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>

            <label for="content">Content:</label>
            <textarea id="content" name="content" rows="5" required>{{ post.content }}</textarea>

            <button type="submit">Update Post</button>
        </form>
        <br>
        <a href="{{ url_for('index') }}">Cancel and Go Back</a>
    </div>
</body>
</html>
